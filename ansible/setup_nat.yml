- hosts: localhost # Bastion 내부에서 실행
  become: yes
  tasks:
    - name: Enable IPv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Set up NAT Masquerade
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: enp3s0 # AWS t3 계열은 보통 ens5입니다. 'ip addr'로 확인 필요
        jump: MASQUERADE

    - name: Configure MSS Clamping for NAT (via shell)
      shell: |
        iptables -t nat -C POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1460 || \
        iptables -t nat -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1460
      register: mss_result
      changed_when: "'added' in mss_result.stdout"